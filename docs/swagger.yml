openapi: 3.0.3
info:
  title: AI Dependency API
  version: 1.0.0
paths:
  /api/v1/users:
    post:
      summary: ユーザー登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  email:
                    type: string

  /api/v1/login:
    post:
      summary: ログイン
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string

  /api/v1/results:
    get:
      summary: 診断履歴取得
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK

    post:
      summary: 診断結果保存
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ai_score:
                  type: integer
                algorithm_score:
                  type: integer
                db_score:
                  type: integer
                web_score:
                  type: integer
                dependency_score:
                  type: integer
                advice:
                  type: string
      responses:
        "201":
          description: Created

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT